<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ensenada Verde · Accounting V3</title>
<style>
  :root{
    --green-900:#0a3a23; --green-800:#0e4a2f; --green-700:#0e5234; --green-600:#1f9d57;
    --green-500:#1fa85f; --green-400:#5cc183; --green-300:#9bdcb5; --green-100:#e6f6ec;
    --leaf:#1fa85f; --gold:#d9a521; --rust:#c0552f; --sky:#3a7bd5;
    --ink:#1d2a22; --muted:#6b7c70; --line:#e2ece5; --bg:#f3f8f4; --card:#ffffff;
    --shadow:0 1px 3px rgba(20,54,31,.08),0 6px 18px rgba(20,54,31,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-size:14px; line-height:1.45;}
  a{color:var(--green-700)}
  .app{display:flex; min-height:100vh}
  .side{width:210px; background:linear-gradient(180deg,var(--green-800),var(--green-900));
    color:#dff3e6; padding:18px 0; position:sticky; top:0; height:100vh; flex-shrink:0;}
  .brand{display:block; padding:8px 16px 16px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:10px; text-align:center}
  .brandfull{width:100%;max-width:170px;height:auto;display:block;margin:0 auto 6px}
  .brandfallback{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
  .brandsub{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#bfe0cb;opacity:.85}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 18px;color:#cfead9;text-decoration:none;font-weight:500;cursor:pointer;border-left:3px solid transparent}
  .nav a .ic{width:18px;text-align:center}
  .nav a:hover{background:rgba(255,255,255,.06)}
  .nav a.active{background:rgba(57,168,98,.22);border-left-color:var(--leaf);color:#fff}
  .side .foot{position:absolute;bottom:14px;left:0;right:0;padding:0 18px;font-size:11px;opacity:.6}
  .settings-link{display:flex;align-items:center;gap:11px;margin-top:8px;padding:9px 18px;color:#9fc7ad;cursor:pointer;font-size:12.5px;font-weight:500;border-top:1px solid rgba(255,255,255,.08)}
  .settings-link .ic{width:18px;text-align:center}
  .settings-link:hover{color:#fff;background:rgba(255,255,255,.06)}
  .main{flex:1;min-width:0;padding:22px 26px 60px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .topbar h1{font-size:21px;margin:0;font-weight:650;letter-spacing:-.2px}
  .topbar .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  select,input,textarea{font-family:inherit;font-size:13.5px;color:var(--ink);border:1px solid var(--line);
    background:#fff;border-radius:9px;padding:8px 10px;outline:none}
  select:focus,input:focus,textarea:focus{border-color:var(--green-400);box-shadow:0 0 0 3px rgba(57,168,98,.13)}
  .btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-weight:600;font-size:13px;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--green-400)}
  .btn.primary{background:var(--green-600);border-color:var(--green-600);color:#fff}
  .btn.primary:hover{background:var(--green-700)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:5px 9px;font-size:12px}
  .btn.danger{color:var(--rust);border-color:#f0d3c9}
  .btn.danger:hover{background:#fbeee8}
  .grid{display:grid;gap:14px}
  .cards{grid-template-columns:repeat(auto-fit,minmax(168px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow)}
  .kpi .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .kpi .val{font-size:23px;font-weight:700;margin-top:7px;letter-spacing:-.5px}
  .kpi .hint{font-size:11.5px;color:var(--muted);margin-top:3px}
  .kpi.accent .val{color:var(--green-700)}
  .kpi.warn .val{color:var(--gold)}
  .kpi.bad .val{color:var(--rust)}
  .section{margin-top:22px}
  .section h2{font-size:15px;margin:0 0 11px;font-weight:650;display:flex;align-items:center;gap:8px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .panel .ph{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .panel .ph h3{margin:0;font-size:13.5px;font-weight:650}
  .panel .pb{padding:6px 0}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 14px;font-size:13px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600;background:#fafdfb;position:sticky;top:0}
  tr:last-child td{border-bottom:none}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{max-height:520px;overflow:auto}
  .muted{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600}
  .pill.green{background:#e3f6ea;color:#1c7a42}
  .pill.gold{background:#fbf0d8;color:#a9781b}
  .pill.rust{background:#fbe5dc;color:#a8401f}
  .pill.sky{background:#e2eefb;color:#2b5fa6}
  .pill.grey{background:#eef1ef;color:#5b6b60}
  .right{margin-left:auto}
  .lb-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .lb-row:last-child{border-bottom:none}
  .rank{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:700;background:#eef1ef;color:#5b6b60;flex-shrink:0}
  .rank.r1{background:linear-gradient(135deg,#f6d365,#e0a83b);color:#fff}
  .rank.r2{background:linear-gradient(135deg,#d7dde2,#aeb8c0);color:#fff}
  .rank.r3{background:linear-gradient(135deg,#e8b88a,#c08552);color:#fff}
  .lb-name{font-weight:650;min-width:90px}
  .lb-bar{flex:1;height:10px;border-radius:6px;background:#eef3ef;overflow:hidden;min-width:60px}
  .lb-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green-400),var(--green-600))}
  .lb-fig{text-align:right;min-width:96px;font-variant-numeric:tabular-nums}
  .lb-fig b{font-size:15px}
  .lb-fig small{display:block;color:var(--muted);font-size:11px}
  .modal-bg{position:fixed;inset:0;background:rgba(20,40,28,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal .mh h3{margin:0;font-size:16px}
  .modal .mb{padding:18px 20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .calc{background:var(--green-100);border-radius:10px;padding:11px 13px;font-size:12.5px;margin-top:4px}
  .calc div{display:flex;justify-content:space-between;padding:2px 0}
  .calc b{font-variant-numeric:tabular-nums}
  .iconbtn{cursor:pointer;color:var(--muted);padding:3px 6px;border-radius:7px;font-size:13px;border:none;background:none}
  .iconbtn:hover{background:#eef3ef;color:var(--ink)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .bartrack{height:9px;border-radius:5px;background:#eef3ef;overflow:hidden;margin-top:6px;display:flex}
  .hide{display:none!important}
  @media(max-width:820px){.side{width:60px}.brandsub,.brandfallback,.nav a span.txt,.settings-link .txt,.side .foot{display:none}.brandfull{max-width:40px}.nav a{justify-content:center;padding:12px 0}.settings-link{justify-content:center}.main{padding:16px}}
  .letterhead-bg{display:none}
  @media print{
    @page{size:letter;margin:0}
    .side,.tools,.topbar,.noprint{display:none!important}
    .main{padding:0}body{background:#fff}
    #reportSheet{position:relative;width:8.5in;min-height:11in;margin:0 auto;overflow:hidden}
    .letterhead-bg{display:block;position:absolute;top:0;left:0;width:8.5in;height:11in;z-index:0}
    .rep-content{position:relative;z-index:1;padding:1.75in 0.95in 1.5in 0.95in}
    .ev-rep-logo{display:none}
    #reportSheet h2{color:#0e5234;font-size:18px}#reportSheet h3{color:#0e5234}
    .panel{box-shadow:none;border:0;background:transparent}
    .card{background:rgba(255,255,255,.86);border:1px solid #d7e6dc}
    .section{margin-top:12px}
  }
</style>
</head>

<div class="app">

    <div class="brand">

      <div class="brandsub">Accounting V3</div>

  <main class="main">

</div>

/* ============================================================
   CLOUD SYNC  (Google Apps Script endpoint)
   Same URL as the audit log. On every save: POST the full DB.
   On startup: GET ?action=load and refresh if cloud is newer.
   Falls back to localStorage gracefully when offline.
   ============================================================ */
function getSyncUrl(){return (DB&&DB.settings&&DB.settings.logUrl)||'';}
function getSyncToken(){return (DB&&DB.settings&&DB.settings.logToken)||'';}
function setSyncStatus(s){
  var el=document.getElementById('syncStatus'); if(!el)return;
  var map={
    idle:'',
    syncing:'<span style="color:var(--muted)">⏳ Syncing…</span>',
    saved:'<span style="color:var(--green-600)">☁ Saved</span>',
    offline:'<span style="color:var(--muted)">📴 Offline</span>',
    error:'<span style="color:var(--gold)">⚠ Sync error</span>'
  };
  el.innerHTML=map[s]||'';
}
function cloudSave(){
  var url=getSyncUrl(); if(!url)return;
  setSyncStatus('syncing');
  try{
    fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'save',db:JSON.stringify(DB),token:getSyncToken()})})
      .then(function(){setSyncStatus('saved');})
      .catch(function(){setSyncStatus('offline');});
  }catch(e){setSyncStatus('offline');}
}
/* Timestamped Drive backups. Each data change schedules a snapshot; the timer
   is debounced so a burst of saves produces ONE file once activity settles.
   The Apps Script writes EnsenadaVerde_V3_<stamp>.json to the backup folder.
   Drive never overwrites by name, so no snapshot is ever lost. */
const BACKUP_DEBOUNCE_MS=4000;
let _backupTimer=null;
function stampNow(){const d=new Date(),p=n=>String(n).padStart(2,'0');
  return ''+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());}
function scheduleBackup(){
  if(!getSyncUrl())return;
  clearTimeout(_backupTimer);
  _backupTimer=setTimeout(cloudBackup,BACKUP_DEBOUNCE_MS);
}
function cloudBackup(){
  var url=getSyncUrl(); if(!url)return;
  try{
    fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'backup',db:JSON.stringify(DB),stamp:stampNow(),token:getSyncToken()})})
      .then(function(){setSyncStatus('saved');})
      .catch(function(){setSyncStatus('offline');});
  }catch(e){setSyncStatus('offline');}
}
function cloudLoad(cb){
  var url=getSyncUrl(); if(!url){cb(null);return;}
  setSyncStatus('syncing');
  try{
    var sep=url.indexOf('?')>=0?'&':'?';
    fetch(url+sep+'action=load&token='+encodeURIComponent(getSyncToken()))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok&&d.db){setSyncStatus('saved');try{cb(JSON.parse(d.db));}catch(e){cb(null);}}
        else{setSyncStatus(d.ok?'idle':'error');cb(null);}
      })
      .catch(function(){setSyncStatus('offline');cb(null);});
  }catch(e){setSyncStatus('offline');cb(null);}
}
function startupSync(){
  cloudLoad(function(remote){
    if(!remote)return;
    /* cloud wins — update local cache and re-render */
    DB=remote;
    lsSet(STORE_KEY,JSON.stringify(DB));
    currentMonth='ALL';
    render();
  });
}

/* ---------- MONEY ENGINE ---------- */
function amount(s){return +(s.price*s.qty);}
function split(s){
  const amt=amount(s),ev=amt*EV_RATE,seller=amt*SELLER_RATE,supplier=amt-ev-seller;
  return {amt,ev,seller,supplier,packaging:+(s.packaging||0),evNet:ev-(s.packaging||0)};
}
/* Event sales: no single seller. The 20% seller commission is split among the
   crew that staffed the event, weighted by hours. sellerShares() returns the
   per-seller weight (summing to 1) for ANY sale, so every per-seller rollup
   (leaderboard, settlements, report, income cards) can treat events uniformly. */
function isEventSale(s){return !!(s.crew&&s.crew.length);}
function sellerShares(s){
  if(isEventSale(s)){
    const tot=s.crew.reduce((a,c)=>a+(+c.hours||0),0);
    if(tot>0)return s.crew.map(c=>({seller:c.seller,w:(+c.hours||0)/tot}));
    return s.crew.map(c=>({seller:c.seller,w:1/s.crew.length}));   // no hours → equal split
  }
  return s.seller?[{seller:s.seller,w:1}]:[];
}
function sellerCellHTML(s){
  if(isEventSale(s)){
    const tip=(s.crew||[]).map(c=>esc(c.seller)+' '+(+c.hours||0)+'h').join(', ');
    return '<span class="pill gold" title="'+tip+'">🎪 '+esc(s.eventName||'Event')+'</span>';
  }
  return esc(s.seller||'—');
}

const MX0=n=>'$'+Math.round(n).toLocaleString('en-US');
function monthKey(d){return (d||'').slice(0,7);}
function fmtDate(d){if(!d)return'—';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0].slice(2);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function today(){return new Date().toISOString().slice(0,10);}
function nowTime(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  setTitle('Dashboard','Live overview of sales, cash and commissions');
  const S=salesInScope();
  const tot=S.reduce((a,s)=>a+amount(s),0);
  let ev=0,salePack=0,cashIn=0,clientOwes=0,sellerHolds=0;
  S.forEach(s=>{const x=split(s);ev+=x.ev;salePack+=x.packaging;
    if(s.state==='settled')cashIn+=x.amt;else if(s.state==='client_owes')clientOwes+=x.amt;else sellerHolds+=x.amt;});
  const bulkList=(DB.packagingExpenses||[]).filter(e=>currentMonth==='ALL'||monthKey(e.date)===currentMonth);
  const bulkPack=bulkList.reduce((a,e)=>a+(+e.amount||0),0);
  const pack=salePack+bulkPack;          // total packaging = per-sale + bulk
  const evNet=ev-pack;
  const sup={};DB.suppliers.forEach(su=>sup[su.name]={rev:0,net:0,pack:0,n:0});
  S.forEach(s=>{const x=split(s);if(!sup[s.supplier])sup[s.supplier]={rev:0,net:0,pack:0,n:0};
    sup[s.supplier].rev+=x.amt;sup[s.supplier].net+=x.supplier;sup[s.supplier].pack+=x.packaging;sup[s.supplier].n++;});
  bulkList.forEach(e=>{if(sup[e.supplier])sup[e.supplier].pack+=(+e.amount||0);});
  /* ---- all-time cash position (running physical balance; ignores the month filter) ---- */
  const settledAll=DB.sales.filter(s=>s.state==='settled');
  const collectedAll=settledAll.reduce((a,s)=>a+amount(s),0);
  let fondoAll=0,supPaidAll=0,selPaidAll=0,wdAll=0;
  (DB.settlements||[]).forEach(p=>{const a2=+p.amount||0;
    if(p.type==='deposit')fondoAll+=a2;else if(p.type==='supplier')supPaidAll+=a2;else if(p.type==='seller')selPaidAll+=a2;else wdAll+=a2;});
  const packAll=DB.sales.reduce((a,s)=>a+(+s.packaging||0),0)+(DB.packagingExpenses||[]).reduce((a,e)=>a+(+e.amount||0),0);
  const drawer=fondoAll+collectedAll-supPaidAll-selPaidAll-wdAll-packAll;
  let supEarnAll=0,selEarnAll=0;settledAll.forEach(s=>{const x=split(s);supEarnAll+=x.supplier;selEarnAll+=x.seller;});
  const owedOut=Math.max(0,supEarnAll-supPaidAll)+Math.max(0,selEarnAll-selPaidAll);
  const clientOwesAll=DB.sales.filter(s=>s.state==='client_owes').reduce((a,s)=>a+amount(s),0);
  const sellerHoldsAll=DB.sales.filter(s=>s.state==='seller_holds').reduce((a,s)=>a+amount(s),0);
  views.innerHTML=
    '<div class="grid cards">'+
      kpi('Total sales',MX0(tot),S.length+' sales','accent','💰')+
      kpi('EV margin (20%)',MX0(ev),'before packaging','','🏪')+
      kpi('Packaging cost',MX0(pack),'paid by EV','warn','📦')+
      kpi('EV net',MX0(evNet),'margin − packaging',evNet>=0?'accent':'bad','✅')+
    '</div>'+
    '<div class="section"><h2>💵 Cash position <span class="muted" style="font-weight:400;font-size:12px">— running balance, all-time</span></h2>'+
      '<div class="grid cards">'+
        kpi('Cash in drawer',MX0(drawer),'Fondo + collected − payouts − expenses',drawer>=0?'accent':'bad','🔒')+
        kpi('Owed out',MX0(owedOut),'suppliers + sellers (in the drawer)',owedOut>0?'warn':'','📤')+
        kpi('Clients owe',MX0(clientOwesAll),'not paid yet',clientOwesAll>0?'bad':'','⏳')+
        kpi('Sellers holding',MX0(sellerHoldsAll),'collected, not handed in',sellerHoldsAll>0?'warn':'','🤝')+
      '</div></div>'+

      '<div class="panel"><div class="pb"><div class="tablewrap"><table><thead><tr>'+
      '<th>Supplier</th><th>Owner</th><th class="num">Sales</th><th class="num">Revenue</th>'+
      '<th class="num">Supplier net (60%)</th><th class="num">Packaging used</th><th style="width:160px">EV packaging load</th>'+
      '</tr></thead><tbody>'+
      DB.suppliers.map(su=>{const d=sup[su.name];const share=pack>0?(d.pack/pack*100):0;
        return '<tr><td><b>'+esc(su.name)+'</b></td><td class="muted">'+esc(su.person)+'</td>'+
        '<td class="num">'+d.n+'</td><td class="num">'+MX(d.rev)+'</td>'+
        '<td class="num">'+MX(d.net)+'</td><td class="num">'+MX(d.pack)+'</td>'+
        '<td><div class="bartrack"><i style="width:'+share+'%;background:'+(su.name==='Bajafly'?'var(--leaf)':'var(--sky)')+'"></i></div>'+
        '<small class="muted">'+share.toFixed(0)+'% of packaging spend</small></td></tr>';}).join('')+
      '</tbody></table></div></div></div></div>'+
    '<div class="section"><h2>👤 Your income — David & Ricardo (supplier + seller)</h2>'+
      '<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr))">'+
      incomeCard('David','Bajafly',S)+incomeCard('Ricardo','Gamiz',S)+

function incomeCard(person,supplierName,S){
  let sellerInc=0,supInc=0,pend=0;
  S.forEach(s=>{const x=split(s);const realized=s.state==='settled';
    const sh=sellerShares(s).find(z=>z.seller===person);
    if(sh){sellerInc+=x.seller*sh.w;if(!realized)pend+=x.seller*sh.w;}
    if(s.supplier===supplierName){supInc+=x.supplier;if(!realized)pend+=x.supplier;}});
  const total=sellerInc+supInc;
  return '<div class="card"><div class="kpi"><div class="label">'+esc(person)+' <span class="pill grey">'+esc(supplierName)+'</span></div>'+
    '<div class="val" style="color:var(--green-700)">'+MX0(total)+'</div>'+

/* ---------- LEADERBOARD ---------- */
function renderLeaderboard(){
  setTitle('Leaderboard','Performance, commissions and cash by seller');
  const L=s=>trText(s);
  const loc=LANG==='es'?'es-MX':'en-US';
  const selMonth=currentMonth==='ALL'?today().slice(0,7):currentMonth;
  let monLbl=new Date(selMonth+'-01T00:00').toLocaleString(loc,{month:'long',year:'numeric'});
  monLbl=monLbl.charAt(0).toUpperCase()+monLbl.slice(1);
  /* commission already paid out to each seller (settlement ledger) */
  const paidSeller={};DB.salespersons.forEach(n=>paidSeller[n]=0);
  DB.settlements.forEach(p=>{if(p.type==='seller')paidSeller[p.payee]=(paidSeller[p.payee]||0)+(+p.amount||0);});
  /* per-seller accumulator; event sales are distributed across the crew by hours */
  const stat={};DB.salespersons.forEach(n=>stat[n]={name:n,allSold:0,allComm:0,allN:0,pSold:0,pComm:0,pN:0,
    commSettled:0,commPending:0,heldFull:0,heldComm:0,recvClient:0,prod:{},clients:new Set(),lastDate:'',lastTs:''});
  DB.sales.forEach(s=>{const x=split(s);const inP=monthKey(s.date)===selMonth;const k=saleSortKey(s);
    sellerShares(s).forEach(sh=>{const d=stat[sh.seller];if(!d)return;const w=sh.w;
      d.allSold+=x.amt*w;d.allComm+=x.seller*w;d.allN++;
      if(inP){d.pSold+=x.amt*w;d.pComm+=x.seller*w;d.pN++;}
      if(s.state==='settled')d.commSettled+=x.seller*w;
      else if(s.state==='client_owes'){d.commPending+=x.seller*w;d.recvClient+=x.amt*w;}
      else if(s.state==='seller_holds'){d.heldFull+=x.amt*w;d.heldComm+=x.seller*w;}
      if(s.product)d.prod[s.product]=(d.prod[s.product]||0)+(+s.qty||0)*w;
      if(s.client)d.clients.add(s.client);
      if(k>d.lastTs){d.lastTs=k;d.lastDate=s.date;}});});
  const data=DB.salespersons.map(name=>{const d=stat[name];const paid=paidSeller[name]||0;
    return {name:d.name,allSold:d.allSold,allComm:d.allComm,allN:d.allN,pSold:d.pSold,pComm:d.pComm,pN:d.pN,
      commSettled:d.commSettled,commPending:d.commPending,paid,owedByEV:d.commSettled-paid,
      heldFull:d.heldFull,heldComm:d.heldComm,heldOwedToEV:d.heldFull-d.heldComm,recvClient:d.recvClient,
      top3:Object.entries(d.prod).sort((a,b)=>b[1]-a[1]).slice(0,3).map(p=>[p[0],Math.round(p[1]*100)/100]),
      avg:d.allN?d.allSold/d.allN:0,clients:d.clients.size,lastDate:d.lastDate};
  });
  const ranked=[...data].sort((a,b)=>b.allSold-a.allSold);
  const sum=f=>data.reduce((a,d)=>a+f(d),0);
  const maxSold=Math.max(1,...data.map(d=>d.allSold));
  const totalOwed=data.reduce((a,d)=>a+Math.max(0,d.owedByEV),0);
  const totalHeld=sum(d=>d.heldFull),totalHeldEV=sum(d=>d.heldOwedToEV);
  /* KPI sales counts use real sale rows (not per-seller participation) */
  const periodSold=DB.sales.filter(s=>monthKey(s.date)===selMonth).reduce((a,s)=>a+amount(s),0);
  const periodN=DB.sales.filter(s=>monthKey(s.date)===selMonth).length;
  const allSoldT=DB.sales.reduce((a,s)=>a+amount(s),0),allNT=DB.sales.length;
  const card=(d,i)=>{
    const rk=i+1;const pills=[];
    if(d.allN===0)pills.push('<span class="pill grey">'+L('No sales yet')+'</span>');
    if(d.heldFull>0.005)pills.push('<span class="pill gold">💰 '+L('Holds')+' '+MX0(d.heldFull)+'</span>');
    if(d.owedByEV>0.005)pills.push('<span class="pill green">'+L('EV owes')+' '+MX0(d.owedByEV)+'</span>');
    else if(d.owedByEV<-0.005)pills.push('<span class="pill sky">'+L('Advanced')+' '+MX0(-d.owedByEV)+'</span>');
    if(d.commPending>0.005)pills.push('<span class="pill rust">'+MX0(d.commPending)+' '+L('pending')+'</span>');
    const top=d.top3.length?d.top3.map(p=>'<div class="sd-prod"><span>'+esc(p[0])+'</span><b>'+p[1]+'</b></div>').join(''):'<div class="sd-prod muted">—</div>';
    return '<div class="sd-card'+(d.allN===0?' sd-dim':'')+'">'+
      '<div class="sd-head"><div class="sd-rank '+(rk<=3?'r'+rk:'')+'">'+rk+'</div><div class="sd-name">'+esc(d.name)+'</div></div>'+
      (d.allN?'<div class="sd-bar"><i style="width:'+Math.max(2,d.allSold/maxSold*100)+'%"></i></div>':'')+
      (pills.length?'<div class="sd-pills">'+pills.join('')+'</div>':'')+
      '<div class="sd-twin">'+
        '<div class="sd-box"><div class="t">'+esc(monLbl)+'</div><div class="v">'+MX0(d.pSold)+'</div><div class="s">'+d.pN+' '+L('sales')+' · '+MX0(d.pComm)+' '+L('comm.')+'</div></div>'+
        '<div class="sd-box"><div class="t">'+L('All-time')+'</div><div class="v">'+MX0(d.allSold)+'</div><div class="s">'+d.allN+' '+L('sales')+' · '+MX0(d.allComm)+' '+L('comm.')+'</div></div>'+
      '</div>'+
      '<div class="sd-sec">'+L('Commissions')+'</div><div class="sd-rows">'+
        '<div class="sd-row"><span>'+L('Earned (settled)')+'</span><b>'+MX(d.commSettled)+'</b></div>'+

        '<div class="sd-row"><span>'+L('EV owes now')+'</span><b style="color:'+(d.owedByEV>0.005?'var(--green-700)':'inherit')+'">'+MX(d.owedByEV)+'</b></div>'+

      '</div>'+
      (d.heldFull>0.005?'<div class="sd-sec">'+L('Cash in hands')+'</div><div class="sd-rows">'+
        '<div class="sd-row"><span>'+L('Cash held')+'</span><b>'+MX(d.heldFull)+'</b></div>'+
        '<div class="sd-row"><span>'+L('Owe back to EV')+'</span><b style="color:var(--gold)">'+MX(d.heldOwedToEV)+'</b></div>'+
        '<div class="sd-row"><span>'+L('Their commission in it')+'</span><b>'+MX(d.heldComm)+'</b></div>'+
      '</div>':'')+
      '<div class="sd-sec">'+L('Top products')+'</div><div class="sd-rows">'+top+'</div>'+
      '<div class="sd-foot"><span>'+L('Avg ticket')+' '+MX0(d.avg)+'</span><span>'+d.clients+' '+L('clients')+'</span><span>'+L('last')+' '+(d.lastDate?fmtDate(d.lastDate):'—')+'</span></div>'+
    '</div>';
  };
  views.innerHTML=
    '<style>'+
    '.sd-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;margin-top:14px}'+
    '.sd-card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px 15px;display:flex;flex-direction:column;gap:10px}'+
    '.sd-card.sd-dim{opacity:.55}'+

    '.sd-name{font-weight:700;font-size:15px;flex:1}'+

/* ---------- REPORT (by month or custom date range) ---------- */
let repFrom='', repTo='';
function isoD(d){return d.toISOString().slice(0,10);}
function repInit(){if(!repFrom||!repTo){const d=new Date();repFrom=isoD(new Date(d.getFullYear(),d.getMonth(),1));repTo=isoD(new Date(d.getFullYear(),d.getMonth()+1,0));}}
function repPreset(which){const d=new Date();
  if(which==='thismonth'){repFrom=isoD(new Date(d.getFullYear(),d.getMonth(),1));repTo=isoD(new Date(d.getFullYear(),d.getMonth()+1,0));}
  else if(which==='lastmonth'){repFrom=isoD(new Date(d.getFullYear(),d.getMonth()-1,1));repTo=isoD(new Date(d.getFullYear(),d.getMonth(),0));}
  else if(which==='thisyear'){repFrom=isoD(new Date(d.getFullYear(),0,1));repTo=isoD(new Date(d.getFullYear(),11,31));}
  else {repFrom='2000-01-01';repTo='2099-12-31';}
  render();
}
function repApply(){repFrom=document.getElementById('rep_from').value||repFrom;repTo=document.getElementById('rep_to').value||repTo;render();}
function renderReport(){
  setTitle('Report','Summary by month or custom date range');
  repInit();
  const inR=x=>x.date>=repFrom&&x.date<=repTo;
  const sales=DB.sales.filter(inR);
  const pkg=(DB.packagingExpenses||[]).filter(inR);
  const tot=sales.reduce((a,s)=>a+amount(s),0);

      kpi('Total sales',MX0(tot),sales.length+' sales','accent','💰')+

      kpi('Packaging',MX0(pack),'sale + bulk','warn','📦')+

    '<div class="section"><h3>By supplier</h3><div class="panel"><div class="pb"><table><thead><tr><th>Supplier</th><th class="num">Sales</th><th class="num">Revenue</th><th class="num">Net (60%)</th><th class="num">Packaging</th></tr></thead><tbody>'+
      DB.suppliers.map(su=>{const d=sup[su.name];return '<tr><td><b>'+esc(su.name)+'</b></td><td class="num">'+d.n+'</td><td class="num">'+MX(d.rev)+'</td><td class="num">'+MX(d.net)+'</td><td class="num">'+MX(d.pack)+'</td></tr>';}).join('')+
    '</tbody></table></div></div></div>'+

      (lb.length?lb.map((r,i)=>'<tr><td>'+(i+1)+'</td><td><b>'+esc(r.n)+'</b></td><td class="num">'+MX(r.sold)+'</td><td class="num">'+MX(r.comm)+'</td><td class="num">'+r.c+'</td></tr>').join('')

function saveAdminPin(){

}
function sellerHasSales(name){return DB.sales.some(s=>s.seller===name||(s.crew&&s.crew.some(c=>c.seller===name)));}
function addSellerFromSettings(){
  const nm=(prompt(trText('New seller name'))||'').trim();
  if(!nm)return;
  if(DB.salespersons.includes(nm)){alert(trText('That seller already exists.'));return;}
  DB.salespersons.push(nm);save();render();settingsModal();
}
function delSellerFromSettings(name){
  if(sellerHasSales(name)){alert(trText('Cannot remove a seller who has sales. Their history would break.'));return;}
  if(!confirm(trText('Remove this seller?')+' '+name))return;
  DB.salespersons=DB.salespersons.filter(x=>x!==name);save();render();settingsModal();
}
function startFresh(){
  const pin=(DB.settings&&DB.settings.adminPin)||'';
  if(!pin){alert('Set an admin PIN first in ⚙ Settings before using Start fresh.');return;}
  const entered=prompt('Enter admin PIN to start fresh:');
  if(entered===null)return;
  if(entered!==pin){alert('Incorrect PIN. Nothing was deleted.');return;}
  if(!confirm('Start fresh? This deletes ALL sales, packaging costs and settlements. Your products, clients and salespeople are kept. This cannot be undone — use Backup first if unsure.'))return;
  DB.sales=[];DB.packagingExpenses=[];DB.settlements=[];save();currentMonth='ALL';closeModal();render();
  alert('Cleared. Record your Fondo de caja in Settlements → “+ Fondo de caja”.');
}

function savePkg(id){

function liveCalc(){

function exportCSV(){
  const head=['Date','Time','Product','Client','Salesperson','Supplier','UnitPrice','Qty','Amount','EV_20','Seller_20','Supplier_60','Packaging','Status','Notes'];
  const rows=[...DB.sales].sort((a,b)=>saleSortKey(a).localeCompare(saleSortKey(b))).map(s=>{const x=split(s);
    return [s.date,s.ts?s.ts.slice(11,16):'',s.product,s.client,isEventSale(s)?('Event:'+esc(s.eventName||'')):s.seller,s.supplier,s.price,s.qty,x.amt,x.ev,x.seller,x.supplier,x.packaging,PAY_STATES[s.state].label,s.notes||''];});
  const cell=c=>{c=String(c==null?'':c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;};
  const csv=[head].concat(rows).map(r=>r.map(cell).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='EnsenadaVerde_sales_'+today()+'.csv';a.click();
}
function importJSON(file){
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(!d.sales||!d.salespersons)throw 0;
    if(!confirm('Replace all current data with this backup?'))return;
    if(!d.packagingExpenses)d.packagingExpenses=[];
    if(!d.settings)d.settings={adminPin:''};
    DB=d;save();render();alert('Imported.');
  }catch(err){alert('That file is not a valid Ensenada Verde backup.');}};
  r.readAsText(file);
}

        .catch(function(){var q=qGet();q.push(entry);qSet(q);});}

    }
    function flush(){if(!cfg('logUrl'))return;var q=qGet();if(!q.length)return;qSet([]);q.forEach(function(e){if(!e.ip)stampIP(e);post(e);});}
