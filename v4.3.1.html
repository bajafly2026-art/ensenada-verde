<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ensenada Verde · Accounting V4.3.1</title>
<style>
  :root{
    --green-900:#0a3a23; --green-800:#0e4a2f; --green-700:#0e5234; --green-600:#1f9d57;
    --green-500:#1fa85f; --green-400:#5cc183; --green-300:#9bdcb5; --green-100:#e6f6ec;
    --leaf:#1fa85f; --gold:#d9a521; --rust:#c0552f; --sky:#3a7bd5;
    --ink:#1d2a22; --muted:#6b7c70; --line:#e2ece5; --bg:#f3f8f4; --card:#ffffff;
    --shadow:0 1px 3px rgba(20,54,31,.08),0 6px 18px rgba(20,54,31,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-size:14px; line-height:1.45;}
  a{color:var(--green-700)}
  .app{display:flex; min-height:100vh}
  .side{width:210px; background:linear-gradient(180deg,var(--green-800),var(--green-900));
    color:#dff3e6; padding:18px 0; position:sticky; top:0; height:100vh; flex-shrink:0;}
  .brand{display:block; padding:8px 16px 16px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:10px; text-align:center}
  .brandfull{width:100%;max-width:170px;height:auto;display:block;margin:0 auto 6px}
  .brandfallback{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
  .brandsub{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#bfe0cb;opacity:.85}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 18px;color:#cfead9;text-decoration:none;font-weight:500;cursor:pointer;border-left:3px solid transparent}
  .nav a .ic{width:18px;text-align:center}
  .nav a:hover{background:rgba(255,255,255,.06)}
  .nav a.active{background:rgba(57,168,98,.22);border-left-color:var(--leaf);color:#fff}
  .side .foot{position:absolute;bottom:14px;left:0;right:0;padding:0 18px;font-size:11px;opacity:.6}
  .settings-link{display:flex;align-items:center;gap:11px;margin-top:8px;padding:9px 18px;color:#9fc7ad;cursor:pointer;font-size:12.5px;font-weight:500;border-top:1px solid rgba(255,255,255,.08)}
  .settings-link .ic{width:18px;text-align:center}
  .settings-link:hover{color:#fff;background:rgba(255,255,255,.06)}
  .main{flex:1;min-width:0;padding:22px 26px 60px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .topbar h1{font-size:21px;margin:0;font-weight:650;letter-spacing:-.2px}
  .topbar .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  select,input,textarea{font-family:inherit;font-size:13.5px;color:var(--ink);border:1px solid var(--line);
    background:#fff;border-radius:9px;padding:8px 10px;outline:none}
  select:focus,input:focus,textarea:focus{border-color:var(--green-400);box-shadow:0 0 0 3px rgba(57,168,98,.13)}
  .btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-weight:600;font-size:13px;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--green-400)}
  .btn.primary{background:var(--green-600);border-color:var(--green-600);color:#fff}
  .btn.primary:hover{background:var(--green-700)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:5px 9px;font-size:12px}
  .btn.danger{color:var(--rust);border-color:#f0d3c9}
  .btn.danger:hover{background:#fbeee8}
  .mtoggle{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;width:100%}
  .mtoggle .mt{flex:1;padding:8px 10px;border:none;background:#fff;font:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
  .mtoggle .mt.on{background:var(--green-100);color:var(--green-700)}
  .mtoggle .mt+.mt{border-left:1px solid var(--line)}
  .grid{display:grid;gap:14px}
  .cards{grid-template-columns:repeat(auto-fit,minmax(168px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow)}
  .kpi .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .kpi .val{font-size:23px;font-weight:700;margin-top:7px;letter-spacing:-.5px}
  .kpi .hint{font-size:11.5px;color:var(--muted);margin-top:3px}
  .kpi.accent .val{color:var(--green-700)}
  .kpi.warn .val{color:var(--gold)}
  .kpi.bad .val{color:var(--rust)}
  .section{margin-top:22px}
  .section h2{font-size:15px;margin:0 0 11px;font-weight:650;display:flex;align-items:center;gap:8px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .panel .ph{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .panel .ph h3{margin:0;font-size:13.5px;font-weight:650}
  .panel .pb{padding:6px 0}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 14px;font-size:13px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600;background:#fafdfb;position:sticky;top:0}
  tr:last-child td{border-bottom:none}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{max-height:520px;overflow:auto}
  .muted{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600}
  .pill.green{background:#e3f6ea;color:#1c7a42}
  .pill.gold{background:#fbf0d8;color:#a9781b}
  .pill.rust{background:#fbe5dc;color:#a8401f}
  .pill.sky{background:#e2eefb;color:#2b5fa6}
  .pill.grey{background:#eef1ef;color:#5b6b60}
  .right{margin-left:auto}
  .lb-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .lb-row:last-child{border-bottom:none}
  .rank{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:700;background:#eef1ef;color:#5b6b60;flex-shrink:0}
  .rank.r1{background:linear-gradient(135deg,#f6d365,#e0a83b);color:#fff}
  .rank.r2{background:linear-gradient(135deg,#d7dde2,#aeb8c0);color:#fff}
  .rank.r3{background:linear-gradient(135deg,#e8b88a,#c08552);color:#fff}
  .lb-name{font-weight:650;min-width:90px}
  .lb-bar{flex:1;height:10px;border-radius:6px;background:#eef3ef;overflow:hidden;min-width:60px}
  .lb-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green-400),var(--green-600))}
  .lb-fig{text-align:right;min-width:96px;font-variant-numeric:tabular-nums}
  .lb-fig b{font-size:15px}
  .lb-fig small{display:block;color:var(--muted);font-size:11px}
  .modal-bg{position:fixed;inset:0;background:rgba(20,40,28,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal .mh h3{margin:0;font-size:16px}
  .modal .mb{padding:18px 20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .calc{background:var(--green-100);border-radius:10px;padding:11px 13px;font-size:12.5px;margin-top:4px}
  .calc div{display:flex;justify-content:space-between;padding:2px 0}
  .calc b{font-variant-numeric:tabular-nums}
  .iconbtn{cursor:pointer;color:var(--muted);padding:3px 6px;border-radius:7px;font-size:13px;border:none;background:none}
  .iconbtn:hover{background:#eef3ef;color:var(--ink)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .bartrack{height:9px;border-radius:5px;background:#eef3ef;overflow:hidden;margin-top:6px;display:flex}
  .hide{display:none!important}
  @media(max-width:820px){.side{width:60px}.brandsub,.brandfallback,.nav a span.txt,.settings-link .txt,.side .foot{display:none}.brandfull{max-width:40px}.nav a{justify-content:center;padding:12px 0}.settings-link{justify-content:center}.main{padding:16px}}
  .letterhead-bg{display:none}
  @media print{
    @page{size:letter;margin:0}
    .side,.tools,.topbar,.noprint{display:none!important}
    .main{padding:0}body{background:#fff}
    #reportSheet{position:relative;width:8.5in;min-height:11in;margin:0 auto;overflow:hidden}
    .letterhead-bg{display:block;position:absolute;top:0;left:0;width:8.5in;height:11in;z-index:0}
    .rep-content{position:relative;z-index:1;padding:1.75in 0.95in 1.5in 0.95in}
    .ev-rep-logo{display:none}
    #reportSheet h2{color:#0e5234;font-size:18px}#reportSheet h3{color:#0e5234}
    .panel{box-shadow:none;border:0;background:transparent}
    .card{background:rgba(255,255,255,.86);border:1px solid #d7e6dc}
    .section{margin-top:12px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <img class="brandfull" src="Graphic%20ressources/logos/2_Sin_Fondo.png" alt="Ensenada Verde" onerror="this.style.display='none';document.getElementById('brandtxt').style.display='block'">
      <div id="brandtxt" class="brandfallback" style="display:none">Ensenada Verde</div>
      <div class="brandsub">Accounting V4.3.1</div>
    </div>
    <nav class="nav" id="nav">
      <a data-view="dashboard" class="active"><span class="ic">📊</span><span class="txt">Dashboard</span></a>

</div>

<script>
"use strict";
/* ============================================================
   ENSENADA VERDE · ACCOUNTING V4.3.1  (self-contained, offline)
   Money rules: EV keeps 20% of every sale. Salesperson keeps 20%,
   taken from the supplier's side. Supplier keeps the remaining 60%.
   Packaging is paid by EV and tracked per supplier.
   V4.3: every money movement is tagged with a payment method —
   cash (moves the drawer) or bank (card/transfer, moves the bank
   account). New "transfer" movement moves money drawer ↔ bank.
   V4.3.1: sale window lists only the 10 most-used products (+ add /
   search-database options) and can register a new client from a
   stacked pop-out. Products tab = one window per supplier plus an
   "Old projects" archive; products move between windows via a
   supplier + archived tag (single DB.products array — history,
   leaderboards and sync stay intact).
   ============================================================ */
const STORE_KEY='ensenadaVerde_v3';
const EV_RATE=0.20, SELLER_RATE=0.20;   // supplier keeps 0.60

/* Safe storage: falls back to in-memory if localStorage is blocked
   (e.g. opaque file:// origins, private mode). The app never crashes
   on startup because of storage. */
const MEM={};
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return (k in MEM)?MEM[k]:null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){MEM[k]=String(v);}}

const PAY_STATES={
  settled:{label:'In cashier',pill:'green'},
  client_owes:{label:'Client owes',pill:'rust'},
  seller_holds:{label:'Seller holds',pill:'gold'}
};
const PAY_ORDER=['settled','client_owes','seller_holds'];
/* V4.2: bulk packaging can be fronted by a partner; EV then owes the payer. */
function pkgPaidBy(e){return e.paidBy||'EV';}

/* V4.3: payment method — cash moves the drawer; bank (card/transfer) moves
   the bank account. Legacy records without a method count as cash. */
const METHODS={cash:{label:'Cash',icon:'💵',pill:'gold'},bank:{label:'Bank',icon:'🏦',pill:'sky'}};
function mth(r){return r&&r.method==='bank'?'bank':'cash';}
function migrateMethods(d){if(!d)return d;
  ['sales','settlements','packagingExpenses'].forEach(k=>{(d[k]||[]).forEach(r=>{if(r.method!=='bank'&&r.method!=='cash')r.method='cash';});});
  /* V4.3.1: products carry archived flag (Old projects window) */
  (d.products||[]).forEach(p=>{if(typeof p.archived==='undefined')p.archived=false;});
  return d;}
/* V4.3.1: product usage ranking for the sale window's short list */
function productUsage(){const u={};DB.sales.forEach(s=>{if(s.product)u[s.product]=(u[s.product]||0)+1;});return u;}
function topProducts(n){const u=productUsage();
  return DB.products.filter(p=>!p.archived)
    .sort((a,b)=>((u[b.name]||0)-(u[a.name]||0))||sortStr(a.name,b.name)).slice(0,n);}
function methodToggleHTML(id,cur){cur=cur==='bank'?'bank':'cash';
  return '<div class="mtoggle" id="'+id+'">'+['cash','bank'].map(k=>
    '<button type="button" class="mt'+(k===cur?' on':'')+'" data-m="'+k+'" onclick="mtSet(\''+id+'\',\''+k+'\')">'+METHODS[k].icon+' '+trText(METHODS[k].label)+'</button>').join('')+'</div>';}
function mtSet(id,k){const b=document.getElementById(id);if(!b)return;b.querySelectorAll('.mt').forEach(x=>x.classList.toggle('on',x.dataset.m===k));}
function mtGet(id){const b=document.getElementById(id);const on=b&&b.querySelector('.mt.on');return on&&on.dataset.m==='bank'?'bank':'cash';}
function mthPillHTML(r){const m=METHODS[mth(r)];return '<span class="pill '+m.pill+'">'+m.icon+' '+trText(m.label)+'</span>';}

/* ---------- I18N ---------- */
let LANG=lsGet('ev_lang')||'en';
const NAV_EN={dashboard:'Dashboard',sales:'Sales',leaderboard:'Leaderboard',clients:'Clients',products:'Products',sellers:'Sellers',packaging:'Packaging',settlements:'Settlements',report:'Report'};
const NAV_ES={dashboard:'Panel',sales:'Ventas',leaderboard:'Ranking',clients:'Clientes',products:'Productos',sellers:'Vendedores',packaging:'Empaque',settlements:'Liquidaciones',report:'Reporte'};
const T_TEXT={
  "Dashboard":"Panel",
  "In cashier":"En caja","Client owes":"Cliente debe","Seller holds":"Vendedor retiene",
  "Change status":"Cambiar estado",
  "Set":"Cambiar",

  "Status":"Estado","Seller":"Vendedor","Supplier":"Proveedor","Client":"Cliente","Product":"Producto",
  "Newest first":"Recientes primero","Oldest first":"Antiguas primero",
  "Clear filters":"Limpiar filtros",
  "Click to change status":"Clic para cambiar estado",
  "Cash":"Efectivo","Bank":"Banco","Method":"Método",
  "Sellers":"Vendedores",
  "Sales crew — add or remove salespeople":"Equipo de ventas — agrega o quita vendedores",
  "in use":"en uso","removable":"se puede quitar",
  "Sellers with sales cannot be removed — their history would break.":"Los vendedores con ventas no se pueden quitar — se rompería su historial.",
  "Sellers and products are managed in their own tabs (left rail).":"Los vendedores y productos se administran en sus propias pestañas (barra izquierda).",
  "New client":"Nuevo cliente",
  "old":"antiguo","No matches":"Sin resultados",
  "Archive":"Archivar","Other":"Otros",
  "Old projects (archive)":"Proyectos antiguos (archivo)",
  "No products here yet.":"Aún no hay productos aquí.",
  "Catalog by supplier, plus archived old projects":"Catálogo por proveedor, más proyectos antiguos archivados",
  "Move to":"Mover a",
  "Future sales of this product will credit that supplier (60%). Past sales are not changed.":"Las ventas futuras de este producto acreditarán a ese proveedor (60%). Las ventas pasadas no cambian.",
  "Moving a product between supplier windows changes who earns the 60% on future sales; past sales keep their original supplier. Archived products stay out of the sale menus but keep their full history.":"Mover un producto entre ventanas de proveedor cambia quién gana el 60% en ventas futuras; las ventas pasadas conservan su proveedor original. Los productos archivados salen de los menús de venta pero conservan todo su historial.",
  "Payment method":"Método de pago",

  "pending":"pendiente",
  "Advanced":"Adelanto",
  "How seller balances work":"Cómo funcionan los saldos",
  "Select at least one crew member who worked the event":"Selecciona al menos una persona que trabajó el evento",
  "New seller name":"Nombre del nuevo vendedor",
  "That seller already exists.":"Ese vendedor ya existe.",
  "Cannot remove a seller who has sales. Their history would break.":"No se puede eliminar un vendedor con ventas. Se rompería su historial.",
  "Remove this seller?":"¿Eliminar este vendedor?",
  "EV owes now = commission on settled sales not yet paid. Cash in hands = full sale cash a seller collected; they keep 20% and owe EV the rest.":"EV debe ahora = comisión de ventas en caja aún no pagada. Efectivo en manos = todo el dinero que el vendedor cobró; conserva su 20% y debe a EV el resto.",
  "Sales":"Ventas",
  "Every sale, who sold it, and whether the cash is in":"Cada venta, quién la vendió y si el dinero ya entró",
  "Leaderboard":"Ranking de vendedores",
  "Who is selling the most — and what they have earned":"Quién vende más — y cuánto ha ganado",
  "Clients":"Clientes",
  "Your relationships and what each one owes":"Tus relaciones y lo que cada uno debe",
  "Products":"Productos",
  "Catalog and default prices by supplier":"Catálogo y precios base por proveedor",
  "Settlements":"Liquidaciones",
  "Payouts to suppliers & sellers, and cash withdrawals":"Pagos a proveedores y vendedores, y retiros de caja",
  "All time":"Todo el tiempo",
  "Packaging":"Empaque",
  "Bulk packaging costs covered by Ensenada Verde":"Costos de empaque a granel cubiertos por Ensenada Verde",
  "Report":"Reporte",
  "Summary by month or custom date range":"Resumen por mes o rango de fechas"
};
const ES_PAIRS=[
  ["+ Event sale</button>","+ Venta de evento</button>"],
  ["Payment method</label>","Método de pago</label>"],
  [" sellers</h3>"," vendedores</h3>"],

/* ---------- STATE ---------- */
/* Sync reconciliation flags — declared BEFORE load() runs so a fresh, seeded
   device starts "unsynced" and cannot push its seed over real cloud data.
   _cloudSynced: true once we've reconciled with the cloud, OR we booted with
   real local data already present. _cloudSavedAt: server stamp of last load. */
var _cloudSynced=false,_cloudSavedAt='';
let DB;
DB=load();   /* split from declaration: keeps DB out of the temporal dead zone
                while load()->save() run on first launch (empty storage) */
/* Keep entity lists alphabetical so every dropdown / datalist / picker is sorted.
   Sales-driven tables (leaderboard, clients, products) re-sort by their own metric. */
function sortStr(a,b){return String(a==null?'':a).localeCompare(String(b==null?'':b),'es',{sensitivity:'base'});}
function sortData(d){d=d||DB;if(!d)return d;
  if(Array.isArray(d.salespersons))d.salespersons.sort(sortStr);
  if(Array.isArray(d.suppliers))d.suppliers.sort((a,b)=>sortStr(a.name,b.name));
  if(Array.isArray(d.products))d.products.sort((a,b)=>sortStr(a.name,b.name));
  if(Array.isArray(d.clients))d.clients.sort((a,b)=>sortStr(a.name,b.name));
  return d;
}
function load(){
  try{const raw=lsGet(STORE_KEY);if(raw){const d=JSON.parse(raw);if(!d.packagingExpenses)d.packagingExpenses=[];if(!d.settings)d.settings={adminPin:''};migrateMethods(d);
    /* Shed the old per-device sync config so it stops riding along in the synced DB
       (endpoint is hardcoded now; identity is auto from device metadata). */
    if(d.settings){delete d.settings.logUrl;delete d.settings.logToken;delete d.settings.deviceUser;}
    /* Booted with real local data → known device, safe to push. */
    _cloudSynced=true;return sortData(d);}}catch(e){}
  /* First launch (empty storage): seed LOCALLY ONLY. Never push the seed to the
     cloud — startupSync() pulls real cloud data if any exists. (Pushing the seed
     here is exactly what wiped the cloud DB on 2026-06-18.) */
  const s=seed();sortData(s);lsSet(STORE_KEY,JSON.stringify(s));return s;
}
function save(d,opts){DB=d||DB;sortData(DB);lsSet(STORE_KEY,JSON.stringify(DB));cloudSave(opts&&opts.allowReset);scheduleBackup();}

/* ============================================================
   CLOUD SYNC  (Google Apps Script endpoint)
   Same URL as the audit log. On every save: POST the full DB.
   On startup: GET ?action=load and refresh if cloud is newer.
   Falls back to localStorage gracefully when offline.
   ============================================================ */
/* ONE hardcoded endpoint — every device/browser syncs + logs here with ZERO setup.
   (Previously this could be overridden per-device in Settings, and the override was
   stored in the SYNCED DB — so configuring one device silently changed all of them
   and left the others pointing nowhere. That option is gone: nothing to configure.) */
var SYNC_URL='https://script.google.com/macros/s/AKfycbwjP0SZFHQbAWTtH4N46Cbdiw7SkdIyKAn6q9xCioem6_Du-N1d9UVawocog5c5Hlsp/exec';
function getSyncUrl(){return SYNC_URL;}
function getSyncToken(){return '';}
function setSyncStatus(s){
  var el=document.getElementById('syncStatus'); if(!el)return;
  var map={
    idle:'',
    syncing:'<span style="color:var(--muted)">⏳ Syncing…</span>',
    saved:'<span style="color:var(--green-600)">☁ Saved</span>',
    offline:'<span style="color:var(--muted)">📴 Offline</span>',
    error:'<span style="color:var(--gold)">⚠ Sync error</span>'
  };
  el.innerHTML=map[s]||'';
}
function cloudSave(allowReset){
  var url=getSyncUrl(); if(!url)return;
  /* Don't push until we've reconciled with the cloud at least once (unless this
     is an explicit reset/import). Stops a just-opened device from overwriting
     real cloud data before startupSync has had a chance to pull it. */
  if(!_cloudSynced && !allowReset)return;
  setSyncStatus('syncing');
  try{
    fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'save',db:JSON.stringify(DB),token:getSyncToken(),allowReset:!!allowReset,baseSavedAt:_cloudSavedAt})})
      .then(function(){setSyncStatus('saved');})
      .catch(function(){setSyncStatus('offline');});
  }catch(e){setSyncStatus('offline');}
}
/* Timestamped Drive backups. Each data change schedules a snapshot; the timer
   is debounced so a burst of saves produces ONE file once activity settles.
   The Apps Script writes EnsenadaVerde_V3_<stamp>.json to the backup folder.
   Drive never overwrites by name, so no snapshot is ever lost. */
const BACKUP_DEBOUNCE_MS=4000;
let _backupTimer=null;
function stampNow(){const d=new Date(),p=n=>String(n).padStart(2,'0');
  return ''+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());}
function scheduleBackup(){
  if(!getSyncUrl())return;
  clearTimeout(_backupTimer);
  _backupTimer=setTimeout(cloudBackup,BACKUP_DEBOUNCE_MS);
}
function cloudBackup(){
  var url=getSyncUrl(); if(!url)return;
  if(!_cloudSynced)return;   /* never snapshot a not-yet-reconciled (seed) device */
  try{
    fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'backup',db:JSON.stringify(DB),stamp:stampNow(),token:getSyncToken()})})
      .then(function(){setSyncStatus('saved');})
      .catch(function(){setSyncStatus('offline');});
  }catch(e){setSyncStatus('offline');}
}
function cloudLoad(cb){
  var url=getSyncUrl(); if(!url){cb(null);return;}
  setSyncStatus('syncing');
  /* JSONP — bypasses CORS entirely; works on all browsers incl. Android Chrome */
  var cbName='_evLoad'+Date.now();
  var el=document.createElement('script');
  var done=false;
  function cleanup(){done=true;delete window[cbName];try{if(el.parentNode)el.parentNode.removeChild(el);}catch(x){}}
  window[cbName]=function(d){
    cleanup();
    if(d&&d.ok){
      _cloudSavedAt=d.savedAt||_cloudSavedAt;            /* remember server stamp */
      _cloudSynced=true;                                 /* we've seen the cloud → safe to push */
      if(d.db){setSyncStatus('saved');try{cb(JSON.parse(d.db),true);}catch(e){cb(null,true);}}
      else{setSyncStatus('idle');cb(null,true);}          /* cloud reachable but empty */
    }else{setSyncStatus(d?'error':'offline');cb(null,false);}
  };
  el.onerror=function(){cleanup();setSyncStatus('offline');cb(null,false);};
  var sep=url.indexOf('?')>=0?'&':'?';
  el.src=url+sep+'action=load&callback='+cbName+'&token='+encodeURIComponent(getSyncToken());
  document.head.appendChild(el);
  /* 30-second safety timeout — GAS cold starts can take 10-15s on mobile networks */
  setTimeout(function(){if(!done){cleanup();setSyncStatus('offline');cb(null,false);}},30000);
}
function startupSync(){
  /* Retry up to 2 times — handles GAS cold-start timeout on slow mobile connections */
  function attempt(retriesLeft){
    cloudLoad(function(remote,reachable){
      if(remote){
        DB=migrateMethods(remote);
        lsSet(STORE_KEY,JSON.stringify(DB));
        _cloudSynced=true;          /* reconciled — pushes are now safe */
        currentMonth='ALL';
        render();
      } else if(reachable){
        _cloudSynced=true;          /* cloud reachable but empty (first-ever use) */
      } else if(retriesLeft>0){
        setSyncStatus('syncing');
        setTimeout(function(){attempt(retriesLeft-1);},3000);
      } else {
        /* Offline after retries. We never reached the cloud, so we can't have
           clobbered it; allow local saves to push once connectivity returns. */
        _cloudSynced=true;
      }
    });
  }
  attempt(2);
}

/* ---------- MONEY ENGINE ---------- */
function amount(s){return +(s.price*s.qty);}
function split(s){
  const amt=amount(s),ev=amt*EV_RATE,seller=amt*SELLER_RATE,supplier=amt-ev-seller;
  return {amt,ev,seller,supplier,packaging:+(s.packaging||0),evNet:ev-(s.packaging||0)};
}
/* Event sales: no single seller. The 20% seller commission is split among the
   crew that staffed the event, weighted by hours. sellerShares() returns the
   per-seller weight (summing to 1) for ANY sale, so every per-seller rollup
   (leaderboard, settlements, report, income cards) can treat events uniformly. */
function isEventSale(s){return !!(s.crew&&s.crew.length);}
function sellerShares(s){
  if(isEventSale(s)){
    const tot=s.crew.reduce((a,c)=>a+(+c.hours||0),0);
    if(tot>0)return s.crew.map(c=>({seller:c.seller,w:(+c.hours||0)/tot}));
    return s.crew.map(c=>({seller:c.seller,w:1/s.crew.length}));   // no hours → equal split
  }
  return s.seller?[{seller:s.seller,w:1}]:[];
}
function sellerCellHTML(s){
  if(isEventSale(s)){
    const tip=(s.crew||[]).map(c=>esc(c.seller)+' '+(+c.hours||0)+'h').join(', ');
    return '<span class="pill gold" title="'+tip+'">🎪 '+esc(s.eventName||'Event')+'</span>';
  }
  return esc(s.seller||'—');
}
const MX=n=>'$'+(Math.round((n+Number.EPSILON)*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const MX0=n=>'$'+Math.round(n).toLocaleString('en-US');
function monthKey(d){return (d||'').slice(0,7);}
function fmtDate(d){if(!d)return'—';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0].slice(2);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function today(){return new Date().toISOString().slice(0,10);}
function nowTime(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');}
/* V4.3: timestamps to the second. Normalizes 'HH:MM' (older records / some
   browsers' time inputs) to 'HH:MM:SS' so same-day events keep logging order. */
function timeFull(t){t=(t||nowTime());return t.length===5?t+':00':t;}
function tsOf(r){return r.ts||((r.date||'')+'T00:00');}
function fmtTime(r){return r.ts?r.ts.slice(11,19):'—';}
function saleSortKey(s){return s.ts||((s.date||'')+'T00:00');}

function renderDashboard(){
  setTitle('Dashboard','Live overview of sales, cash and commissions');
  const S=salesInScope();
  const tot=S.reduce((a,s)=>a+amount(s),0);
  let ev=0,salePack=0,cashIn=0,clientOwes=0,sellerHolds=0;
  S.forEach(s=>{const x=split(s);ev+=x.ev;salePack+=x.packaging;
    if(s.state==='settled')cashIn+=x.amt;else if(s.state==='client_owes')clientOwes+=x.amt;else sellerHolds+=x.amt;});
  const bulkList=(DB.packagingExpenses||[]).filter(e=>currentMonth==='ALL'||monthKey(e.date)===currentMonth);
  const bulkPack=bulkList.reduce((a,e)=>a+(+e.amount||0),0);
  const pack=salePack+bulkPack;          // total packaging = per-sale + bulk
  const evNet=ev-pack;
  const sup={};DB.suppliers.forEach(su=>sup[su.name]={rev:0,net:0,pack:0,n:0});
  S.forEach(s=>{const x=split(s);if(!sup[s.supplier])sup[s.supplier]={rev:0,net:0,pack:0,n:0};
    sup[s.supplier].rev+=x.amt;sup[s.supplier].net+=x.supplier;sup[s.supplier].pack+=x.packaging;sup[s.supplier].n++;});
  bulkList.forEach(e=>{if(sup[e.supplier])sup[e.supplier].pack+=(+e.amount||0);});
  /* ---- all-time cash position (running physical balance; ignores the month filter) ---- */
  const settledAll=DB.sales.filter(s=>s.state==='settled');
  const collectedAll=settledAll.reduce((a,s)=>a+amount(s),0);
  /* V4.3: every flow is split by method — cash moves the drawer, bank moves the account. */
  let colCash=0,colBank=0;settledAll.forEach(s=>{const a2=amount(s);if(mth(s)==='bank')colBank+=a2;else colCash+=a2;});
  let supPaidAll=0,selPaidAll=0,reimbAll=0;
  let fondoCash=0,fondoBank=0,outCash=0,outBank=0,trToBank=0,trToDrawer=0;
  (DB.settlements||[]).forEach(p=>{const a2=+p.amount||0;
    if(p.type==='transfer'){if(p.direction==='to_drawer')trToDrawer+=a2;else trToBank+=a2;return;}
    if(p.type==='supplier')supPaidAll+=a2;else if(p.type==='seller')selPaidAll+=a2;else if(p.type==='reimbursement')reimbAll+=a2;
    if(p.type==='deposit'){if(mth(p)==='bank')fondoBank+=a2;else fondoCash+=a2;}
    else{if(mth(p)==='bank')outBank+=a2;else outCash+=a2;}});
  /* Only EV-paid packaging leaves a balance at purchase time; partner-fronted
     packaging leaves when its reimbursement is recorded. Per-sale packaging
     is treated as cash from the drawer. */
  const salePackAll=DB.sales.reduce((a,s)=>a+(+s.packaging||0),0);
  let bulkPkgCash=0,bulkPkgBank=0;
  (DB.packagingExpenses||[]).forEach(e=>{if(pkgPaidBy(e)!=='EV')return;if(mth(e)==='bank')bulkPkgBank+=(+e.amount||0);else bulkPkgCash+=(+e.amount||0);});
  const frontedAll=(DB.packagingExpenses||[]).reduce((a,e)=>a+(pkgPaidBy(e)!=='EV'?(+e.amount||0):0),0);
  const drawer=fondoCash+colCash-outCash-salePackAll-bulkPkgCash-trToBank+trToDrawer;
  const bank=fondoBank+colBank-outBank-bulkPkgBank+trToBank-trToDrawer;
  let supEarnAll=0,selEarnAll=0;settledAll.forEach(s=>{const x=split(s);supEarnAll+=x.supplier;selEarnAll+=x.seller;});
  const owedOut=Math.max(0,supEarnAll-supPaidAll)+Math.max(0,selEarnAll-selPaidAll)+Math.max(0,frontedAll-reimbAll);
  const clientOwesAll=DB.sales.filter(s=>s.state==='client_owes').reduce((a,s)=>a+amount(s),0);
  const sellerHoldsAll=DB.sales.filter(s=>s.state==='seller_holds').reduce((a,s)=>a+amount(s),0);
  views.innerHTML=
    '<div class="grid cards">'+
      kpi('Total sales',MX0(tot),S.length+' sales','accent','💰')+
      kpi('EV margin (20%)',MX0(ev),'before packaging','','🏪')+
      kpi('Packaging cost',MX0(pack),'paid by EV','warn','📦')+
      kpi('EV net',MX0(evNet),'margin − packaging',evNet>=0?'accent':'bad','✅')+
    '</div>'+
    '<div class="section"><h2>💵 Cash position <span class="muted" style="font-weight:400;font-size:12px">— running balance, all-time</span></h2>'+
      '<div class="grid cards">'+
        kpi('Cash in drawer',MX0(drawer),'physical cash · cash flows only',drawer>=0?'accent':'bad','🔒')+
        kpi('Bank account',MX0(bank),'card + transfers',bank>=0?'accent':'bad','🏦')+
        kpi('Owed out',MX0(owedOut),'suppliers + sellers (in the drawer)',owedOut>0?'warn':'','📤')+
        kpi('Clients owe',MX0(clientOwesAll),'not paid yet',clientOwesAll>0?'bad':'','⏳')+
        kpi('Sellers holding',MX0(sellerHoldsAll),'collected, not handed in',sellerHoldsAll>0?'warn':'','🤝')+
      '</div></div>'+
    '<div class="section"><h2>🏭 Suppliers — share & packaging used</h2>'+
      '<div class="panel"><div class="pb"><div class="tablewrap"><table><thead><tr>'+
      '<th>Supplier</th><th>Owner</th><th class="num">Sales</th><th class="num">Revenue</th>'+
      '<th class="num">Supplier net (60%)</th><th class="num">Packaging used</th><th style="width:160px">EV packaging load</th>'+
      '</tr></thead><tbody>'+
      DB.suppliers.map(su=>{const d=sup[su.name];const share=pack>0?(d.pack/pack*100):0;
        return '<tr><td><b>'+esc(su.name)+'</b></td><td class="muted">'+esc(su.person)+'</td>'+
        '<td class="num">'+d.n+'</td><td class="num">'+MX(d.rev)+'</td>'+
        '<td class="num">'+MX(d.net)+'</td><td class="num">'+MX(d.pack)+'</td>'+
        '<td><div class="bartrack"><i style="width:'+share+'%;background:'+(su.name==='Bajafly'?'var(--leaf)':'var(--sky)')+'"></i></div>'+
        '<small class="muted">'+share.toFixed(0)+'% of packaging spend</small></td></tr>';}).join('')+
      '</tbody></table></div></div></div></div>'+
    '<div class="section"><h2>👤 Your income — David & Ricardo (supplier + seller)</h2>'+
      '<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr))">'+
      incomeCard('David','Bajafly',S)+incomeCard('Ricardo','Gamiz',S)+
      '</div></div>';
}
function incomeCard(person,supplierName,S){
  let sellerInc=0,supInc=0,pend=0;
  S.forEach(s=>{const x=split(s);const realized=s.state==='settled';
    const sh=sellerShares(s).find(z=>z.seller===person);
    if(sh){sellerInc+=x.seller*sh.w;if(!realized)pend+=x.seller*sh.w;}
    if(s.supplier===supplierName){supInc+=x.supplier;if(!realized)pend+=x.supplier;}});
  const total=sellerInc+supInc;
  return '<div class="card"><div class="kpi"><div class="label">'+esc(person)+' <span class="pill grey">'+esc(supplierName)+'</span></div>'+
    '<div class="val" style="color:var(--green-700)">'+MX0(total)+'</div>'+
    '<div class="hint">'+(pend>0?'<span style="color:var(--gold)">'+MX0(pend)+' still pending</span>':'all realized')+'</div></div>'+
    '<div class="calc" style="margin-top:11px"><div><span>As supplier (60%)</span><b>'+MX(supInc)+'</b></div>'+
    '<div><span>As seller (20%)</span><b>'+MX(sellerInc)+'</b></div></div></div>';
}

function renderLeaderboard(){
  setTitle('Leaderboard','Performance, commissions and cash by seller');
  const L=s=>trText(s);
  const loc=LANG==='es'?'es-MX':'en-US';
  const selMonth=currentMonth==='ALL'?today().slice(0,7):currentMonth;
  let monLbl=new Date(selMonth+'-01T00:00').toLocaleString(loc,{month:'long',year:'numeric'});
  monLbl=monLbl.charAt(0).toUpperCase()+monLbl.slice(1);
  /* commission already paid out to each seller (settlement ledger) */
  const paidSeller={};DB.salespersons.forEach(n=>paidSeller[n]=0);
  DB.settlements.forEach(p=>{if(p.type==='seller')paidSeller[p.payee]=(paidSeller[p.payee]||0)+(+p.amount||0);});
  /* per-seller accumulator; event sales are distributed across the crew by hours */
  const stat={};DB.salespersons.forEach(n=>stat[n]={name:n,allSold:0,allComm:0,allN:0,pSold:0,pComm:0,pN:0,
    commSettled:0,commPending:0,heldFull:0,heldComm:0,recvClient:0,prod:{},clients:new Set(),lastDate:'',lastTs:''});
  DB.sales.forEach(s=>{const x=split(s);const inP=monthKey(s.date)===selMonth;const k=saleSortKey(s);
    sellerShares(s).forEach(sh=>{const d=stat[sh.seller];if(!d)return;const w=sh.w;
      d.allSold+=x.amt*w;d.allComm+=x.seller*w;d.allN++;
      if(inP){d.pSold+=x.amt*w;d.pComm+=x.seller*w;d.pN++;}
      if(s.state==='settled')d.commSettled+=x.seller*w;
      else if(s.state==='client_owes'){d.commPending+=x.seller*w;d.recvClient+=x.amt*w;}
      else if(s.state==='seller_holds'){d.heldFull+=x.amt*w;d.heldComm+=x.seller*w;}
      if(s.product)d.prod[s.product]=(d.prod[s.product]||0)+(+s.qty||0)*w;
      if(s.client)d.clients.add(s.client);
      if(k>d.lastTs){d.lastTs=k;d.lastDate=s.date;}});});

    '<div class="panel"><div class="ph"><h3>'+icon+' '+title+' — '+list.length+' products</h3>'+
    (addSup?'<button class="btn sm primary" onclick="productModal(null,\''+esc(addSup).replace(/'/g,"\\'")+'\')">+ New product</button>':'')+'</div>'+

    (list.length?list.map(p=>rowHTML(p,movesFor(p))).join(''):'<tr><td colspan="6" class="empty">'+trText('No products here yet.')+'</td></tr>')+
    '</tbody></table></div></div></div>';
  const act=DB.products.filter(p=>!p.archived),arch=DB.products.filter(p=>p.archived);
  const supPanels=DB.suppliers.map(su=>{
    const list=act.filter(p=>p.supplier===su.name).sort((a,b)=>stats[b.name].rev-stats[a.name].rev);
    const others=DB.suppliers.filter(o=>o.name!==su.name);
    return panel(esc(su.name),su.name==='Bajafly'?'🪰':'🌱',list,
      p=>others.map(o=>({dest:o.name,label:'→ '+esc(o.name)})).concat([{dest:'__archive__',label:'📦 '+trText('Archive')}]),
      su.name);
  }).join('');
  const orphans=act.filter(p=>!DB.suppliers.some(su=>su.name===p.supplier));
  views.innerHTML=
    '<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(380px,1fr));align-items:start">'+supPanels+'</div>'+
    (orphans.length?'<div class="section">'+panel(trText('Other'),'❓',orphans,
      p=>DB.suppliers.map(o=>({dest:o.name,label:'→ '+esc(o.name)})).concat([{dest:'__archive__',label:'📦 '+trText('Archive')}]),null)+'</div>':'')+
    '<div class="section">'+panel(trText('Old projects (archive)'),'🗄️',[...arch].sort((a,b)=>sortStr(a.name,b.name)),
      p=>DB.suppliers.map(o=>({dest:o.name,label:'→ '+esc(o.name)})),null)+'</div>'+
    '<p class="muted" style="font-size:12px;margin:8px 2px">'+trText('Moving a product between supplier windows changes who earns the 60% on future sales; past sales keep their original supplier. Archived products stay out of the sale menus but keep their full history.')+'</p>';
}
function moveProduct(name,dest){
  const p=DB.products.find(x=>x.name===name);if(!p)return;
  if(dest==='__archive__'){p.archived=true;
    if(window.logEvent)logEvent('product_move',{product:name,to:'archive'});
    save();render();return;}
  if(p.supplier!==dest&&!confirm(trText('Move to')+' '+dest+'? '+trText('Future sales of this product will credit that supplier (60%). Past sales are not changed.')))return;
  p.supplier=dest;p.archived=false;
  if(window.logEvent)logEvent('product_move',{product:name,to:dest});
  save();render();
}

/* ---------- REPORT (by month or custom date range) ---------- */
let repFrom='', repTo='';
function isoD(d){return d.toISOString().slice(0,10);}
function repInit(){if(!repFrom||!repTo){const d=new Date();repFrom=isoD(new Date(d.getFullYear(),d.getMonth(),1));repTo=isoD(new Date(d.getFullYear(),d.getMonth()+1,0));}}
function repPreset(which){const d=new Date();
  if(which==='thismonth'){repFrom=isoD(new Date(d.getFullYear(),d.getMonth(),1));repTo=isoD(new Date(d.getFullYear(),d.getMonth()+1,0));}
  else if(which==='lastmonth'){repFrom=isoD(new Date(d.getFullYear(),d.getMonth()-1,1));repTo=isoD(new Date(d.getFullYear(),d.getMonth(),0));}
  else if(which==='thisyear'){repFrom=isoD(new Date(d.getFullYear(),0,1));repTo=isoD(new Date(d.getFullYear(),11,31));}
  else {repFrom='2000-01-01';repTo='2099-12-31';}
  render();
}
function repApply(){repFrom=document.getElementById('rep_from').value||repFrom;repTo=document.getElementById('rep_to').value||repTo;render();}
function renderReport(){
  setTitle('Report','Summary by month or custom date range');
  repInit();
  const inR=x=>x.date>=repFrom&&x.date<=repTo;
  const sales=DB.sales.filter(inR);
  const pkg=(DB.packagingExpenses||[]).filter(inR);
  const tot=sales.reduce((a,s)=>a+amount(s),0);
  let ev=0,salePack=0,settledAmt=0,owesAmt=0,holdsAmt=0;
  sales.forEach(s=>{const x=split(s);ev+=x.ev;salePack+=x.packaging;

  const lb=DB.salespersons.map(n=>{let sold=0,comm=0,c=0;sales.forEach(s=>{const sh=sellerShares(s).find(z=>z.seller===n);if(sh){const x=split(s);sold+=x.amt*sh.w;comm+=x.seller*sh.w;c++;}});return {n,sold,comm,c};}).filter(r=>r.c>0).sort((a,b)=>b.sold-a.sold);

    '<div class="panel noprint" style="margin-bottom:14px"><div style="padding:12px 16px;display:flex;gap:10px;align-items:end;flex-wrap:wrap">'+

    '</div></div>'+

    '<h2 style="margin:0 0 2px">Ensenada Verde — Report</h2>'+
    '<div class="muted" style="margin-bottom:14px">'+fmtR(repFrom)+' → '+fmtR(repTo)+' · '+sales.length+' sales</div>'+
    '<div class="grid cards">'+
      kpi('Total sales',MX0(tot),sales.length+' sales','accent','💰')+
      kpi('EV margin (20%)',MX0(ev),'before packaging','','🏪')+
      kpi('Packaging',MX0(pack),'sale + bulk','warn','📦')+
      kpi('EV net',MX0(evNet),'margin − packaging',evNet>=0?'accent':'bad','✅')+
    '</div>'+
    '<div class="section"><h3>By supplier</h3><div class="panel"><div class="pb"><table><thead><tr><th>Supplier</th><th class="num">Sales</th><th class="num">Revenue</th><th class="num">Net (60%)</th><th class="num">Packaging</th></tr></thead><tbody>'+
      DB.suppliers.map(su=>{const d=sup[su.name];return '<tr><td><b>'+esc(su.name)+'</b></td><td class="num">'+d.n+'</td><td class="num">'+MX(d.rev)+'</td><td class="num">'+MX(d.net)+'</td><td class="num">'+MX(d.pack)+'</td></tr>';}).join('')+

function sellerHasSales(name){return DB.sales.some(s=>s.seller===name||(s.crew&&s.crew.some(c=>c.seller===name)));}
function addSellerUI(){
  const nm=(prompt(trText('New seller name'))||'').trim();
  if(!nm)return;
  if(DB.salespersons.includes(nm)){alert(trText('That seller already exists.'));return;}
  DB.salespersons.push(nm);save();render();
}
function delSellerUI(name){
  if(sellerHasSales(name)){alert(trText('Cannot remove a seller who has sales. Their history would break.'));return;}
  if(!confirm(trText('Remove this seller?')+' '+name))return;
  DB.salespersons=DB.salespersons.filter(x=>x!==name);save();render();
}
function startFresh(){
  const pin=(DB.settings&&DB.settings.adminPin)||'';
  if(!pin){alert('Set an admin PIN first in ⚙ Settings before using Start fresh.');return;}
  const entered=prompt('Enter admin PIN to start fresh:');
  if(entered===null)return;
  if(entered!==pin){alert('Incorrect PIN. Nothing was deleted.');return;}
  if(!confirm('Start fresh? This deletes ALL sales, packaging costs and settlements. Your products, clients and salespeople are kept. This cannot be undone — use Backup first if unsure.'))return;
  DB.sales=[];DB.packagingExpenses=[];DB.settlements=[];save(DB,{allowReset:true});currentMonth='ALL';closeModal();render();
  alert('Cleared. Record your Fondo de caja in Settlements → “+ Fondo de caja”.');
}

  const inScope=all.filter(e=>currentMonth==='ALL'||monthKey(e.date)===currentMonth);
  const bulkTotal=inScope.reduce((a,e)=>a+(+e.amount||0),0);
  const salePack=salesInScope().reduce((a,s)=>a+(+s.packaging||0),0);
  let general=0;inScope.forEach(e=>{if(!DB.suppliers.some(su=>su.name===e.supplier))general+=(+e.amount||0);});
  /* V4.2: partner-fronted packaging still owed back (all-time balance) */
  let fronted=0,reimb=0;
  (DB.packagingExpenses||[]).forEach(e=>{if(pkgPaidBy(e)!=='EV')fronted+=(+e.amount||0);});
  (DB.settlements||[]).forEach(p=>{if(p.type==='reimbursement')reimb+=(+p.amount||0);});

      kpi('Bulk packaging',MX0(bulkTotal),'logged here','','🏷️')+

function savePkg(id){

    '</div>'+
    '<div class="row2"><div class="field"><label>Unit price (MXN)</label><input type="number" id="f_price" value="'+(newProd?'':s.price)+'" step="0.01"></div>'+
    '<div class="field"><label>Quantity</label><input type="number" id="f_qty" value="'+s.qty+'" step="0.5"></div></div>'+
    '<div class="row2"><div class="field"><label>Client / channel</label>'+
    '<div style="display:flex;gap:6px"><input list="clientList" id="f_client" value="'+esc(s.client)+'" style="flex:1;min-width:0">'+

    '<div class="field"><label>Packaging cost — paid by EV (MXN)</label><input type="number" id="f_pack" value="'+(s.packaging||0)+'" step="0.01"></div></div>'+
    '<div class="field"><label>Notes</label><input id="f_notes" value="'+esc(s.notes||'')+'"></div>'+
    '<div class="calc" id="f_calc"></div></div>'+
    '<div class="mf">'+(id?'<button class="btn danger" onclick="delSale(\''+id+'\',true)">Delete</button>':'')+
    '<button class="btn ghost" onclick="closeModal()">Cancel</button>'+
    '<button class="btn primary" onclick="saveSale(\''+(id||'')+'\')">'+(id?'Save':'Add sale')+'</button></div>';
  openModal();
  const pr=document.getElementById('f_product');
  const savedId=id;
  pr.addEventListener('change',()=>{
    if(pr.value==='__new__'){
      window._postModal=()=>saleModal(savedId||null);
      closeModal();productModal();return;
    }
    if(pr.value==='__search__'){
      const box=document.getElementById('prodSearch');box.classList.remove('hide');
      renderProdSearch('');document.getElementById('f_prodsearch').focus();return;
    }
    document.getElementById('prodSearch').classList.add('hide');
    const o=pr.selectedOptions[0];
    if(o.dataset.price)document.getElementById('f_price').value=o.dataset.price;
    if(o.dataset.sup)document.getElementById('f_supplier').value=o.dataset.sup;
    liveCalc();
  });
  document.getElementById('f_prodsearch').addEventListener('input',e=>renderProdSearch(e.target.value));
  document.getElementById('prodSearchResults').addEventListener('click',e=>{
    const el=e.target.closest('[data-pname]');if(el)pickSearchedProduct(el.dataset.pname);
  });
  const evChk=document.getElementById('f_isEvent');
  evChk.addEventListener('change',()=>{
    document.getElementById('eventBox').style.display=evChk.checked?'':'none';
    document.getElementById('regularSeller').style.display=evChk.checked?'none':'';
  });
  ['f_price','f_qty','f_pack'].forEach(i=>{const el=document.getElementById(i);if(el)el.addEventListener('input',liveCalc);});
  if(newProd){
    const opt=Array.from(document.querySelectorAll('#f_product option')).find(function(o){return o.value===newProd;});
    if(opt){pr.value=newProd;const o=pr.selectedOptions[0];if(o&&o.dataset.price)document.getElementById('f_price').value=o.dataset.price;if(o&&o.dataset.sup)document.getElementById('f_supplier').value=o.dataset.sup;}
  }
  liveCalc();
}
/* V4.3.1: full-database product search inside the sale window */
function renderProdSearch(q){
  const box=document.getElementById('prodSearchResults');if(!box)return;
  q=(q||'').toLowerCase();
  const hits=DB.products.filter(p=>!q||p.name.toLowerCase().indexOf(q)>=0).slice(0,40);
  box.innerHTML=hits.length?hits.map(p=>
    '<div data-pname="'+esc(p.name)+'" style="padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:8px;align-items:center">'+
    '<span><b>'+esc(p.name)+'</b>'+(p.archived?' <span class="pill grey">📦 '+trText('old')+'</span>':'')+'</span>'+
    '<span class="muted" style="font-size:12px;white-space:nowrap">'+MX0(p.price)+'/'+esc(p.unit||'u')+' · '+esc(p.supplier)+'</span></div>').join('')
    :'<div class="empty" style="padding:14px">'+trText('No matches')+'</div>';
}
function pickSearchedProduct(name){
  const p=DB.products.find(x=>x.name===name);if(!p)return;
  const pr=document.getElementById('f_product');if(!pr)return;
  if(![...pr.options].some(o=>o.value===p.name)){
    const o=document.createElement('option');
    o.value=p.name;o.dataset.price=p.price;o.dataset.sup=p.supplier;
    o.textContent=p.name+' — '+MX0(p.price)+'/'+(p.unit||'');
    pr.insertBefore(o,pr.querySelector('option[value="__new__"]'));
  }
  pr.value=p.name;
  document.getElementById('f_price').value=p.price;
  const supSel=document.getElementById('f_supplier');if(supSel)supSel.value=p.supplier;
  document.getElementById('prodSearch').classList.add('hide');
  liveCalc();
}
function liveCalc(){
  const price=+document.getElementById('f_price').value||0,qty=+document.getElementById('f_qty').value||0,pack=+document.getElementById('f_pack').value||0;
  const amt=price*qty,ev=amt*EV_RATE,seller=amt*SELLER_RATE,sup=amt-ev-seller;
  const el=document.getElementById('f_calc');if(!el)return;
  el.innerHTML=
    '<div><span>Sale amount</span><b>'+MX(amt)+'</b></div>'+
    '<div><span>Salesperson (20%)</span><b>'+MX(seller)+'</b></div>'+
    '<div><span>Supplier (60%)</span><b>'+MX(sup)+'</b></div>'+
    '<div style="border-top:1px dashed #b9dcc6;margin-top:4px;padding-top:4px"><span>EV net after packaging</span><b>'+MX(ev-pack)+'</b></div>';
  localize(el);
}
function saveSale(id){
  const g=i=>document.getElementById(i).value;
  const isEv=document.getElementById('f_isEvent')&&document.getElementById('f_isEvent').checked;
  const rec={date:g('f_date'),ts:g('f_date')+'T'+timeFull(g('f_time')),
    product:g('f_product'),supplier:document.getElementById('f_supplier')?g('f_supplier'):DB.suppliers[0].name,
    price:+g('f_price'),qty:+g('f_qty'),client:g('f_client'),state:g('f_state'),
    packaging:+g('f_pack')||0,method:mtGet('f_method'),notes:g('f_notes')};
  if(rec.product==='__new__'||rec.product==='__search__'){alert('Pick or add a product first');return;}
  if(!rec.product){alert('Pick a product');return;}
  if(!rec.price||!rec.qty){alert('Enter a price and quantity');return;}
  if(isEv){
    rec.crew=readCrewFromForm();
    if(!rec.crew.length){alert(trText('Select at least one crew member who worked the event'));return;}
    rec.eventName=g('f_eventName');
    rec.seller='';
  }else{
    rec.seller=document.getElementById('f_seller')?g('f_seller'):'';
  }
  if(id){Object.assign(DB.sales.find(x=>x.id===id),rec);}else{rec.id=uid();DB.sales.push(rec);}
  save();closeModal();render();
}
function delSale(id,fromModal){
  if(!confirm('Delete this sale?'))return;
  DB.sales=DB.sales.filter(x=>x.id!==id);save();if(fromModal)closeModal();render();
}

    '<input type="number" class="evi-qty" placeholder="qty" value="1" step="0.5">'+

function evAddItem(){

function evCalc(){

    '<div><span>Salesperson (20%)</span><b>'+MX(seller)+'</b></div>'+
    '<div><span>Supplier (60%)</span><b>'+MX(sup)+'</b></div>'+
    '<div style="border-top:1px dashed #b9dcc6;margin-top:4px;padding-top:4px"><span>EV net after packaging</span><b>'+MX(ev-pack)+'</b></div>';

function saveEventSale(){
  const g=i=>document.getElementById(i).value;
  const crew=readCrewFromForm();
  if(!crew.length){alert(trText('Select at least one crew member who worked the event'));return;}
  const date=g('ev_date'),ts=date+'T'+timeFull(g('ev_time')),state=g('ev_state'),eventName=g('ev_name').trim();
  const rows=[...document.querySelectorAll('#evItems .ev-item')].map(r=>{
    const sel=r.querySelector('.evi-prod'),o=sel.selectedOptions[0];
    return {product:sel.value,price:+r.querySelector('.evi-price').value,qty:+r.querySelector('.evi-qty').value,
      client:r.querySelector('.evi-client').value.trim(),packaging:+r.querySelector('.evi-pack').value||0,
      method:(r.querySelector('.evi-method')&&r.querySelector('.evi-method').value)==='bank'?'bank':'cash',
      supplier:(o&&o.dataset.sup)||''};
  }).filter(r=>r.product&&r.price&&r.qty);
  if(!rows.length){alert(trText('Add at least one item with product, price and quantity'));return;}
  let newClients=0;
  rows.forEach(r=>{
    if(r.client&&!DB.clients.some(c=>c.name===r.client)){
      DB.clients.push({name:r.client,contact:'',location:'',channel:'Event',notes:'Added from event: '+(eventName||date)});
      newClients++;
    }
    DB.sales.push({id:uid(),date:date,ts:ts,product:r.product,seller:'',
      supplier:r.supplier||DB.suppliers[0].name,price:r.price,qty:r.qty,client:r.client,
      state:state,packaging:r.packaging,method:r.method,notes:'',eventName:eventName,
      crew:crew.map(c=>({seller:c.seller,hours:c.hours}))});
  });
  if(window.logEvent)logEvent('event_sale_create',{event:eventName,items:rows.length,new_clients:newClients,crew:crew,total:rows.reduce((a,r)=>a+r.price*r.qty,0)});
  save();closeModal();render();
}

function saveClient(orig,sub){
  const g=i=>document.getElementById(i).value.trim();
  const rec={name:g('c_name'),channel:g('c_channel'),location:g('c_location'),contact:g('c_contact'),notes:g('c_notes')};
  if(!rec.name){alert('Name required');return;}
  if(orig){const c=DB.clients.find(x=>x.name===orig);const old=c.name;Object.assign(c,rec);
    if(old!==rec.name)DB.sales.forEach(s=>{if(s.client===old)s.client=rec.name;});}
  else{if(DB.clients.some(x=>x.name===rec.name)){alert('Client already exists');return;}DB.clients.push(rec);}
  if(sub){save();closeModal2();
    const fc=document.getElementById('f_client');if(fc)fc.value=rec.name;
    ['clientList','evClientList'].forEach(id=>{const dl=document.getElementById(id);
      if(dl&&![...dl.options].some(o=>o.value===rec.name)){const o=document.createElement('option');o.value=rec.name;dl.appendChild(o);}});
    return;}
  save();closeModal();render();
}
function delClient(name){
  if(!confirm('Delete client "'+name+'"? Their sales stay in the log.'))return;
  DB.clients=DB.clients.filter(x=>x.name!==name);save();render();
}

function savePay(){
  const g=i=>document.getElementById(i).value;

function delSettlement(id){

}

/* ============================================================ EXPORT / IMPORT / CSV ============================================================ */
function exportJSON(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  const stamp=today()+'_'+p(d.getHours())+'-'+p(d.getMinutes())+'-'+p(d.getSeconds());
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='EnsenadaVerde_V4.3.1_'+stamp+'.json';a.click();
}
function exportCSV(){
  const head=['Date','Time','Product','Client','Salesperson','Supplier','UnitPrice','Qty','Amount','EV_20','Seller_20','Supplier_60','Packaging','Status','Method','Notes'];
  const rows=[...DB.sales].sort((a,b)=>saleSortKey(a).localeCompare(saleSortKey(b))).map(s=>{const x=split(s);
    return [s.date,s.ts?s.ts.slice(11,19):'',s.product,s.client,isEventSale(s)?('Event:'+esc(s.eventName||'')):s.seller,s.supplier,s.price,s.qty,x.amt,x.ev,x.seller,x.supplier,x.packaging,PAY_STATES[s.state].label,mth(s),s.notes||''];});
  const cell=c=>{c=String(c==null?'':c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;};
  const csv=[head].concat(rows).map(r=>r.map(cell).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='EnsenadaVerde_sales_'+today()+'.csv';a.click();
}
function importJSON(file){
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(!d.sales||!d.salespersons)throw 0;
    if(!confirm('Replace all current data with this backup?'))return;
    if(!d.packagingExpenses)d.packagingExpenses=[];
    if(!d.settings)d.settings={adminPin:''};
    migrateMethods(d);
    DB=d;_cloudSynced=true;save(DB,{allowReset:true});render();alert('Imported.');
  }catch(err){alert('That file is not a valid Ensenada Verde backup.');}};
  r.readAsText(file);
}

/* ============================================================
   ACTIVITY LOG → Google Sheet (Apps Script Web App)
   Posts one row per data-change event, tagged AUTOMATICALLY by device:
   timestamps, auto device label (browser · OS), persistent device id,
   IP + location, event type, before/after details. No user setup, no
   name to type. Fully fail-safe: if a post fails the event queues
   locally and is retried (app_open / Sync now).
   ============================================================ */
(function(){
  try{
    if(!DB.settings)DB.settings={};
    var DID=lsGet('ev_device_id');if(!DID){DID='dev_'+Math.random().toString(36).slice(2,10);lsSet('ev_device_id',DID);}
    var IPINFO=null;
    function cfg(k){return (DB.settings&&DB.settings[k])||'';}
    /* Friendly device label derived from the user agent — no typing required. */
    function uaLabel(){var u=navigator.userAgent||'';
      var br=/Edg\//.test(u)?'Edge':/OPR\/|Opera/.test(u)?'Opera':/Firefox\//.test(u)?'Firefox':/Chrome\//.test(u)?'Chrome':/Safari\//.test(u)?'Safari':'Browser';
      var os=/Android/.test(u)?'Android':/iPhone|iPad|iPod/.test(u)?'iOS':/Windows/.test(u)?'Windows':/Mac OS X|Macintosh/.test(u)?'macOS':/Linux/.test(u)?'Linux':'';
      return br+(os?' · '+os:'');}
    function meta(){var n=navigator,s=screen,tz='';try{tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';}catch(e){}
      return {ua:n.userAgent||'',platform:n.platform||'',vendor:n.vendor||'',lang:n.language||'',screen:(s.width+'x'+s.height),dpr:window.devicePixelRatio||1,tz:tz,app:'Ensenada Verde V4.3.1',device_label:uaLabel()};}
    function qGet(){try{return JSON.parse(lsGet('ev_log_queue')||'[]');}catch(e){return [];}}
    function qSet(q){lsSet('ev_log_queue',JSON.stringify(q));}
    function stampIP(e){if(IPINFO){e.ip=IPINFO.ip||'';e.city=IPINFO.city||'';e.region=IPINFO.region||'';e.country=IPINFO.country_name||IPINFO.country||'';e.org=IPINFO.org||IPINFO.asn||'';}return e;}
    /* no-cors + text/plain → a "simple" request, so NO CORS preflight. (The old
       application/json POST triggered an OPTIONS preflight that Apps Script never
       answers — which is why logging silently failed on some browsers/devices.) */
    function post(entry){
      try{fetch(getSyncUrl(),{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(entry)})
        .catch(function(){var q=qGet();q.push(entry);qSet(q);});}
      catch(e){var q=qGet();q.push(entry);qSet(q);}
    }
    function flush(){var q=qGet();if(!q.length)return;qSet([]);q.forEach(function(e){if(!e.ip)stampIP(e);post(e);});}
    window.logEvent=function(event,details){
      try{var m=meta();
        var entry={ts_client:new Date().toISOString(),device_label:m.device_label,device_user:m.device_label,device_id:DID,event:event,details:details||{},
          ua:m.ua,platform:m.platform,vendor:m.vendor,screen:m.screen,dpr:m.dpr,lang:m.lang,tz:m.tz,app:m.app};
        stampIP(entry);post(entry);
      }catch(e){}
    };
    function updateQStatus(){var el=document.getElementById('set_qstatus');if(el)el.textContent=qGet().length+' event(s) queued locally';}
    window.logQueueCount=function(){return qGet().length;};
    window.updateQStatus=updateQStatus;
    /* Read-only identity surfaced in Settings — all auto, nothing to type. */
    window.evDeviceInfo=function(){return {id:DID,label:uaLabel(),ip:(IPINFO&&IPINFO.ip)||'',city:(IPINFO&&(IPINFO.city||IPINFO.region))||''};};
    window.evRenderDevInfo=function(){var el=document.getElementById('set_devinfo');if(!el)return;var i=window.evDeviceInfo();
      el.innerHTML='<div><span>Device</span><b>'+i.label+'</b></div>'+
        '<div><span>Device ID</span><b>'+i.id+'</b></div>'+
        '<div><span>IP</span><b>'+(i.ip||'…')+(i.city?' ('+i.city+')':'')+'</b></div>';};
    window.syncLogs=function(){
      var n=qGet().length;flush();updateQStatus();
      alert(n?('Syncing '+n+' queued event'+(n!==1?'s':'')+'… check your Google Sheet.'):'Nothing queued — all caught up.');
    };
    function diffColl(b,a){var bi={},ai={};b.forEach(function(x){bi[x.id]=x;});a.forEach(function(x){ai[x.id]=x;});
      for(var i in ai){if(!bi[i])return{action:'create',record:ai[i]};}
      for(var j in bi){if(!ai[j])return{action:'delete',record:bi[j]};}
      for(var k in ai){if(JSON.stringify(ai[k])!==JSON.stringify(bi[k]))return{action:'edit',record:ai[k],before:bi[k]};}
      return null;}
    function wrapColl(name,label,key){var orig=window[name];if(typeof orig!=='function')return;
      window[name]=function(){var before=JSON.stringify(DB[key]||[]);var r=orig.apply(this,arguments);
        try{var d=diffColl(JSON.parse(before),DB[key]||[]);if(d)logEvent(label+'_'+d.action,d.action==='edit'?{record:d.record,before:d.before}:{record:d.record});}catch(e){}
        return r;};}
    wrapColl('saveSale','sale','sales');wrapColl('delSale','sale','sales');
    wrapColl('saveClient','client','clients');wrapColl('delClient','client','clients');
    wrapColl('saveProduct','product','products');wrapColl('delProduct','product','products');
    wrapColl('savePkg','packaging','packagingExpenses');wrapColl('delPkg','packaging','packagingExpenses');
    wrapColl('savePay','settlement','settlements');wrapColl('delSettlement','settlement','settlements');
    (function(){var orig=window.startFresh;if(typeof orig==='function'){window.startFresh=function(){var b={sales:DB.sales.length,packaging:(DB.packagingExpenses||[]).length,settlements:DB.settlements.length};var r=orig.apply(this,arguments);if((b.sales+b.packaging+b.settlements)>0&&DB.sales.length===0&&(DB.packagingExpenses||[]).length===0&&DB.settlements.length===0)logEvent('reset',{cleared:b});return r;};}})();
    (function(){var orig=window.saveAdminPin;if(typeof orig==='function'){window.saveAdminPin=function(){var r=orig.apply(this,arguments);logEvent('pin_change',{pin_set:!!cfg('adminPin')});return r;};}})();
    var started=false;
    function go(){if(started)return;started=true;
      logEvent('app_open',{});flush();
    }
    try{fetch('https://ipapi.co/json/').then(function(r){return r.json();}).then(function(d){IPINFO=d;go();})['catch'](go);}catch(e){go();}
    setTimeout(go,2500);
  }catch(e){}
})();
